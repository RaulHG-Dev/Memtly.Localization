stages:
  - build
  - test
  - pack
  - publish

variables:
  DOTNET_VERSION: "9.0"
  NUGET_OUTPUT: "./nupkgs"

build:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:9.0
  script:
    - dotnet restore
    - dotnet build --configuration Release --no-restore

test:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:9.0
  script:
    - dotnet test --configuration Release --no-build

pack:
  stage: pack
  image: mcr.microsoft.com/dotnet/sdk:9.0
  script:
    - dotnet pack --configuration Release --output $NUGET_OUTPUT /p:Version=$CI_COMMIT_TAG
  artifacts:
    paths:
      - $NUGET_OUTPUT/*.nupkg
  rules:
    - if: $CI_COMMIT_TAG

publish:
  stage: publish
  image: mcr.microsoft.com/dotnet/sdk:9.0
  script:
    - dotnet nuget push $NUGET_OUTPUT/*.nupkg
        --source "$CI_SERVER_URL/api/v4/projects/$CI_PROJECT_ID/packages/nuget/index.json"
        --api-key $CI_JOB_TOKEN
    - dotnet nuget push $NUGET_OUTPUT/*.nupkg
        --source "https://api.nuget.org/v3/index.json"
        --api-key $NUGET_API_KEY
  rules:
    - if: $CI_COMMIT_TAG